<!DOCTYPE html>
<html lang="en">

<head>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .array-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .element {
            background: #e0f7fa;
            padding: 10px 20px;
            border: 2px solid #006064;
            border-radius: 5px;
            font-weight: bold;
        }

        button {
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }

        .log {
            background: #fcb103;
            padding: 10px;
            margin-top: 20px;
            border-left: 5px solid #333;
        }
    </style>
</head>

<body>
    <h1>Javascript Array Methods</h1>
    <h3>Current 'RSVP for Happy Hour': </h3>

    <div id="visualArray" class="array-container"></div>
    <div id="outputString"></div>

    <hr>
    <!-- var friends = ["Andy", "John", "Joseph", "Amy", "David"] -->
    
    <!-- friends.push("Cathy") -->
    <button onclick="demoPush()">Push (Add to End)</button>   
    <!-- ["Andy", "John", "Joseph", "Amy", "David", "Cathy"]  -->

    <!-- friends.pop() -->
    <button onclick="demoPop()">Pop (Remove Last)</button>
    <!-- ["Andy", "John", "Joseph", "Amy", "David"] -->

    <!-- friends.unshift("Alex") -->
    <button onclick="demoUnshift()">Unshift (Add to Start)</button>
    <!-- ["Alex", "Andy", "John", "Joseph", "Amy", "David"] -->

    <!-- friends.shift() -->
    <button onclick="demoShift()">Shift (Remove First)</button>
    <!-- ["Andy", "John", "Joseph", "Amy", "David"] -->

    <!--  -->
    <!-- <button onclick="demoSplice()">Splice (Insert at 3)</button> -->

    <!-- friends.sort() -->
    <button onclick="demoSort()">Sort (A-Z)</button>
    <!-- ["Amy", "Andy", "David", "John", "Joseph"] -->

    <!-- friends.reverse() -->
    <button onclick="demoReverse()">Reverse (Z-A)</button>
    <!-- ["Joseph", "John", "David", "Andy", "Amy"] -->

    <div class="log" id="actionLog">Action Log: Lets Go!!!</div>

    <script>
        var friends_for_happy_hour = ["Andy", "John", "Joseph", "Amy", "David", "Tom", "Jerry"];
        // Human:               Person  1       2       3          4    5
        // Computers:                   0       1       2          3    4
        
        function updateDisplayToday(action_for_happy_hour){
            const container = document.getElementById('visualArray');
            container.innerHTML = '';

            // This loops through our friends_for_happy_hour array.
            /*
                1. For every person in the list, it runs the code inside curly brackets.
                2. It gives us the friends_for_happy_hour's name (friends) and their position 
                    in the list (index).
            */
            friends_for_happy_hour.forEach((friends, index) => {
            
                /* This creates a brand new, empty <div> element in our computer's memory.
                    It is not visible on our screen.
                */
                let div_today = document.createElement('div');

                // This assigns the CSS class "element" to the new div, 
                // so that we can style it later.
                // <div class="element"></div>
                div_today.className = 'element';

                // This fills our div with the text.
                // If the first friend is Andy, then it will set the text to "0: Andy"
                div_today.innerText = `${index}: ${friends}`;

                // This is our final touch. 
                // 1. It will take that new div
                // 2. It will stick inside an existing element on our page (the container)
                // 3. This is that moment when the friend's name actually appears on our screen.
                // Refer to: https://www.youtube.com/watch?v=e0ihEHxd6vI
                container.appendChild(div_today);
                
                document.getElementById('outputString').innerText = `Friends Coming for Happy Hour: ["${friends_for_happy_hour.join('", "')}"]`;

                document.getElementById('actionLog').innerText = `Action: ${action_for_happy_hour}`;

                document.getElementById('actionLog').innerText = document.getElementById('actionLog').innerText + `, Array Length: ${friends_for_happy_hour.length}`;

            });

        }
        updateDisplayToday("Page Loaded");

        function demoPush(){
            friends_for_happy_hour.push("Jack");
            updateDisplayToday("push('Jack')");
        }

        function demoPop(){
            // ["Andy", "John", "Joseph", "Amy", "David", "Tom", "Jerry"];
            friend_not_coming = friends_for_happy_hour.pop();
            updateDisplayToday(`pop() -> Removed ${friend_not_coming}`);
            // 1. friend_not_coming will first store "Jerry" who is getting removed from our list
            // 1. It will show: pop() -> Removed Jerry

            // 2. Our list will get updated: ["Andy", "John", "Joseph", "Amy", "David", "Tom"];
            // If we click the pop() button again, then 
                // a. friend_not_coming will be updated
                // b. friend_not_coming will store "Tom" (which is the last element)
            // 2. It will show: pop() -> Removed Tom
        }

        function demoUnshift(){
            friends_for_happy_hour.unshift("James");
            updateDisplayToday("unshift('James')");
        }

        function demoShift(){
            friend_not_coming_priority = friends_for_happy_hour.shift();
            updateDisplayToday(`shift() -> Removed ${friend_not_coming_priority}`);
        }

        function demoSort(){
            friends_for_happy_hour.sort();
            updateDisplayToday("sort()");
        }

        function demoReverse(){
            friends_for_happy_hour.reverse();
            updateDisplayToday("reverse()");
        }
        
    </script>


</body>
</html>
